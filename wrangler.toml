name = "anycross-monitor-worker"
main = "src/index.js"
compatibility_date = "2026-04-17"

# Scheduled alert check.
# Cloudflare cron runs in UTC. Default: every 5 minutes.
# Adjust to "*/1 * * * *" for tighter latency (costs more invocations).
[triggers]
crons = ["*/5 * * * *"]

# KV binding for alert dedup and resolved notifications.
# Without it, every scheduled run will resend every firing alert to Feishu.
# Create a namespace first:
#   wrangler kv:namespace create ALERT_STATE
# Then uncomment the block below and fill in the id:
# [[kv_namespaces]]
# binding = "ALERT_STATE"
# id = "<kv-namespace-id>"

[vars]
ANYCROSS_BASE_URL = "https://anycross.feishu.cn"
# Set to "false" to disable the scheduled alert check without removing the cron.
ALERT_CHECK_ENABLED = "true"
# Legacy single-target fallback:
# DEFAULT_HOST_IDS = "host_1,host_2"
# DEFAULT_PROXY_GROUP_IDS = "proxy_group_1,proxy_group_2"
# DEFAULT_SOURCE_NAME = "default"
#
# Preferred multi-target configuration:
# store a JSON array in the ANYCROSS_TARGETS_JSON secret, for example:
# [
#   {
#     "name": "prod-a",
#     "base_url": "https://anycross.feishu.cn",
#     "api_key": "secret-a",
#     "hosts": ["host_1", "host_2"],
#     "proxy_groups": ["pg_1"],
#     "discovery": [
#       {
#         "name": "discover-hosts",
#         "scope": "hosts",
#         "path": "/discover/hosts",
#         "auth_mode": "api_key_query",
#         "item_path": "data.items",
#         "id_path": "id"
#       }
#     ],
#     "version_checks": [
#       {
#         "name": "host-upgrades",
#         "entity_type": "host",
#         "path": "/versions/hosts",
#         "auth_mode": "api_key_query",
#         "item_path": "data.items",
#         "id_path": "id",
#         "name_path": "name",
#         "current_version_path": "current_version",
#         "latest_version_path": "latest_version"
#       }
#     ]
#   },
#   {
#     "name": "prod-b",
#     "api_key": "secret-b",
#     "hosts": ["host_3"]
#   }
# ]
#
# Optional alerting:
# - FEISHU_WEBHOOK_URL can act as the default webhook for all rules
# - FEISHU_WEBHOOK_SECRET can act as the default sign secret for all rules
# - ANYCROSS_ALERTS_JSON should be stored as a secret JSON array
# - version reminder rule type: version_upgrade_available
# - bind a KV namespace named ALERT_STATE if you want dedup and resolved notifications
# ALLOWED_ORIGIN = "*"
